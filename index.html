<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Sign Up Form</title>
</head>
<body>
    <div class="container">
        <div class="text-card">
            <h2>This is not a real online service!</h2>
            <p>Have the freedom to <span>fail.</span></p>
            <p><span id="i-text">Faster</span> you fail, faster you <span id="underline-text">learn.</span></p>
            <p><span id="i-text">Faster</span> you learn, faster you <span id="underline-text">grow.</span></p>
        </div>

        <div class="form-card">
            <p class="form-title">Sign up now to get started</p>

            <form>
                <div class="row">
                    <div class="field">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name">
                    </div>

                    <div class="field">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name">
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email">
                    </div>

                    <div class="field">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone">
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password">
                    </div>

                    <div class="field">
                        <label for="confirm-pass">Confirm Password</label>
                        <input type="password" id="confirm-pass">
                    </div>
                </div>

                <hr>

                <button class="primary-btn">Create account</button>

                <p class="agreement-text">
                    By continuing, you agree to our <a href="#terms">Terms</a> and <a href="#policy">Privacy Policy</a>
                </p>

                <p class="acc-confirmation">
                    Already have an account? <a href="#login">Log in</a>
                </p>
            </form>
        </div>
    </div>
    
    <div class="image-credit">
        <p>Photo by <u>Campbell</u> on <u>Unsplash</u></p>
    </div>
</body>
</html>
